title: The YamBook
frontPage-line1: Brought to you by the team who created <a href="https://hamstudy.org">HamStudy.org</a>
frontPage-app-desc: This YamBook is best used with the YamStudy website. Browse free study materials at the link below!
frontPage-app-label: Study with YamStudy
frontPage-section-title: More Than Just a Book
frontPage-section-intro: >-
  This book is part of our mission to make tropical agriculture more accessible
  and a little more fun. (Okay, actually this book is an April Fools day joke. While we did try to make it accurate using AI tools,
  we can't guarantee everything is correct.) Still, our mission extends beyond this book with these companion projects:
frontPage-hamstudy-desc: >-
  — The go-to website and app that work seamlessly with this book, helping you
  study smarter, track your progress, and join the ham community with confidence.
frontPage-hambook-desc: >- 
  — HamBooks like this one! Browse the free web version at
  <a href="https://hambook.org">HamBook.org</a>, or purchase the digital and
  print editions for your library.
frontPage-examtools-desc: >-
  — Modern software that powers efficient exam sessions across the country—both
  in-person and remote!—streamlining the process whether paperless or traditional,
  so volunteer examiners can focus on you, not paperwork.
frontPage-signalstuff-desc: >-
  — Our small shop featuring the <em>Super-Elastic Signal Stick™</em>, a nearly
  indestructible flexible antenna that actually works! Every purchase at
  <a href="https://signalstuff.com">SignalStuff.com</a> directly supports these
  community resources.
frontPage-team-desc: >-
  We're a small, passionate team with big dreams for the amateur radio community.
  Your support—whether through purchasing a Signal Stick, buying this book, or
  simply spreading the word—makes everything we do possible.
frontPage-welcome: 🌱 Welcome to the fascinating world of yams! 🌱

